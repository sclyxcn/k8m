# ============================================================
# 配置区域 - 请根据实际情况修改以下参数
# ============================================================

name: Sync Upstream & Keep Alive

# ============================================================
# 环境变量配置
# ============================================================
env:
  # 【必填】上游仓库的完整名称，格式: "owner/repo"
  UPSTREAM_REPO: "weibaohui/k8m"
  
  # 同步模式: "incremental"（增量） 或 "force"（强制覆盖）
  SYNC_MODE: "incremental"
  
  # 代码合并策略: "ours"（保留本地）或 "theirs"（使用上游）
  MERGE_STRATEGY: "ours"
  
  # 任务超时时间（分钟）
  JOB_TIMEOUT_MINUTES: "30"

# ============================================================
# 触发器配置
# ============================================================

on:
  workflow_dispatch:
    inputs:
      sync_mode_override:
        description: '🔁 覆盖同步模式'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'incremental'
          - 'force'
      skip_code_sync:
        description: '⏭️ 跳过代码同步'
        required: false
        default: 'false'
        type: boolean
      skip_release_sync:
        description: '⏭️ 跳过 Release 同步'
        required: false
        default: 'false'
        type: boolean
      disable_upstream_actions:
        description: '🚫 禁用上游仓库的 Actions'
        required: false
        default: 'true'
        type: boolean
  
  schedule:
    - cron: "0 3 */5 * *"

# ============================================================
# 任务配置
# ============================================================

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    # 授予所有权限
    permissions:
      contents: write
      actions: write
      issues: write
      pull-requests: write
      metadata: read
    
    concurrency:
      group: sync-upstream
      cancel-in-progress: false

    steps:
      # ============================================
      # 步骤1: 显示配置信息
      # ============================================
      - name: 📋 显示配置信息
        run: |
          echo "=========================================="
          echo "📋 同步配置信息"
          echo "=========================================="
          echo "上游仓库: ${{ env.UPSTREAM_REPO }}"
          echo "同步模式: ${{ env.SYNC_MODE }}"
          echo "合并策略: ${{ env.MERGE_STRATEGY }}"
          echo "定时计划: 0 3 */5 * * (每5天凌晨3点)"
          echo "=========================================="
          
          if [ "${{ env.UPSTREAM_REPO }}" == "OWNER/REPO" ]; then
            echo "❌ 错误: 上游仓库未配置！"
            exit 1
          fi

      # ============================================
      # 步骤2: 检出复刻仓库
      # ============================================
      - name: 📥 检出复刻仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 优先使用 PAT_TOKEN，如果没有则使用 GITHUB_TOKEN
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      # ============================================
      # 步骤3: 配置 Git
      # ============================================
      - name: ⚙️ 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 配置 Git 使用 token 认证
          git config --global http.https://github.com/.extraheader "Authorization: Bearer ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}"

      # ============================================
      # 步骤4: 添加上游仓库
      # ============================================
      - name: 🔗 添加上游仓库
        run: |
          UPSTREAM_URL="https://github.com/${{ env.UPSTREAM_REPO }}.git"
          echo "添加远程仓库: $UPSTREAM_URL"
          git remote add upstream $UPSTREAM_URL || git remote set-url upstream $UPSTREAM_URL
          
          git fetch upstream --tags --prune
          git fetch upstream --prune
          
          echo "✅ 上游仓库添加成功"

      # ============================================
      # 步骤5: 【新增】检查权限
      # ============================================
      - name: 🔑 检查推送权限
        run: |
          echo "=========================================="
          echo "🔑 检查推送权限"
          echo "=========================================="
          
          # 尝试推送一个测试
          if git push origin --dry-run 2>&1 | grep -q "403"; then
            echo "❌ 推送权限不足！"
            echo "请执行以下操作之一："
            echo "1. 在仓库 Settings → Actions → General 中开启 'Read and write permissions'"
            echo "2. 或者创建 PAT_TOKEN 并添加到 Secrets"
            exit 1
          else
            echo "✅ 推送权限正常"
          fi

      # ============================================
      # 步骤6: 禁用上游 Actions
      # ============================================
      - name: 🚫 禁用上游 Actions
        if: github.event.inputs.disable_upstream_actions == 'true'
        run: |
          echo "=========================================="
          echo "🚫 禁用上游仓库的 Actions"
          echo "=========================================="
          
          # 获取当前工作流文件名
          CURRENT_WORKFLOW="sync-upstream.yml"
          
          if [ -d ".github/workflows" ]; then
            echo "发现 .github/workflows 目录"
            
            # 删除其他 workflow 文件，保留当前文件
            find .github/workflows -name "*.yml" -o -name "*.yaml" | while read file; do
              filename=$(basename "$file")
              if [ "$filename" != "$CURRENT_WORKFLOW" ] && [ "$filename" != "sync-upstream.yml" ]; then
                echo "  删除: $file"
                rm -f "$file"
              else
                echo "  保留: $file"
              fi
            done
            
            # 检查是否有更改
            if git status --porcelain | grep -q ".github/workflows"; then
              git add .github/workflows/
              git commit -m "[skip ci] 禁用上游 Actions，仅保留同步工作流"
              git push origin $(git branch --show-current)
              echo "✅ 上游 Actions 已禁用"
            else
              echo "✅ 没有需要禁用的 Actions"
            fi
          else
            echo "⚠️ .github/workflows 目录不存在"
          fi

      # ============================================
      # 步骤7: 合并上游代码
      # ============================================
      - name: 🔄 合并上游代码
        id: merge
        if: github.event.inputs.skip_code_sync != 'true'
        run: |
          CURRENT_BRANCH=$(git branch --show-current)
          echo "当前分支: $CURRENT_BRANCH"
          
          UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | cut -d' ' -f5)
          echo "上游默认分支: $UPSTREAM_BRANCH"
          
          MERGE_STRATEGY="${{ env.MERGE_STRATEGY }}"
          echo "合并策略: $MERGE_STRATEGY"
          
          git pull upstream $UPSTREAM_BRANCH --no-edit || {
            echo "合并冲突，使用 $MERGE_STRATEGY 策略..."
            git pull upstream $UPSTREAM_BRANCH -X recursive -X $MERGE_STRATEGY --no-edit || {
              echo "❌ 合并失败"
              exit 1
            }
          }
          
          git push origin $CURRENT_BRANCH
          echo "merge_success=true" >> $GITHUB_OUTPUT
          echo "✅ 代码同步完成"

      # ============================================
      # 步骤8: 检查上游 Release
      # ============================================
      - name: 🔍 检查上游 Release
        id: check_releases
        if: github.event.inputs.skip_release_sync != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_REPO="${{ env.UPSTREAM_REPO }}"
          echo "=========================================="
          echo "🔍 检查上游仓库: $UPSTREAM_REPO"
          echo "=========================================="
          
          REPO_CHECK=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$UPSTREAM_REPO")
          
          if [ "$REPO_CHECK" != "200" ]; then
            echo "❌ 上游仓库不存在！HTTP: $REPO_CHECK"
            exit 1
          fi
          echo "✅ 上游仓库可访问"
          
          RELEASES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$UPSTREAM_REPO/releases?per_page=100")
          
          RELEASE_COUNT=$(echo "$RELEASES" | jq '. | length')
          echo "📊 上游 Release 数量: $RELEASE_COUNT"
          
          echo "$RELEASES" > /tmp/upstream_releases.json
          echo "release_count=$RELEASE_COUNT" >> $GITHUB_OUTPUT

      # ============================================
      # 步骤9: 同步 Releases
      # ============================================
      - name: 📦 同步 Releases 与制品
        if: github.event.inputs.skip_release_sync != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          
          SYNC_MODE="${{ github.event.inputs.sync_mode_override || env.SYNC_MODE }}"
          UPSTREAM_REPO="${{ env.UPSTREAM_REPO }}"
          CURRENT_REPO="${{ github.repository }}"
          RELEASE_COUNT="${{ steps.check_releases.outputs.release_count }}"
          
          echo "=========================================="
          echo "📦 开始同步 Releases"
          echo "=========================================="
          echo "同步模式: $SYNC_MODE"
          echo "Release 数量: $RELEASE_COUNT"
          echo "=========================================="
          
          if [ "$RELEASE_COUNT" -eq 0 ]; then
            echo "⚠️ 没有 Release 需要同步"
            exit 0
          fi
          
          RELEASES=$(cat /tmp/upstream_releases.json)
          git fetch --tags origin
          LOCAL_TAGS=$(git tag -l)
          
          echo "$RELEASES" | jq -c '.[]' | while read release; do
            TAG_NAME=$(echo $release | jq -r '.tag_name')
            RELEASE_NAME=$(echo $release | jq -r '.name')
            BODY=$(echo $release | jq -r '.body')
            PRERELEASE=$(echo $release | jq -r '.prerelease')
            TARGET_SHA=$(echo $release | jq -r '.target_commitish')
            
            echo ""
            echo "📌 处理 Release: $TAG_NAME"
            
            if echo "$LOCAL_TAGS" | grep -q "^$TAG_NAME$"; then
              echo "   ✅ Tag 已存在"
            else
              echo "   📌 创建 Tag"
              if [ "$TARGET_SHA" == "null" ] || [ -z "$TARGET_SHA" ]; then
                DEFAULT_BRANCH=$(git remote show upstream | grep 'HEAD branch' | cut -d' ' -f5)
                TARGET_SHA=$(git rev-parse upstream/$DEFAULT_BRANCH)
              fi
              git tag "$TAG_NAME" "$TARGET_SHA"
              git push origin "$TAG_NAME"
              echo "   ✅ Tag 已创建"
            fi
            
            # 创建 Release
            RELEASE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$CURRENT_REPO/releases/tags/$TAG_NAME")
            
            if [ "$RELEASE_EXISTS" == "200" ]; then
              echo "   ✅ Release 已存在"
            else
              echo "   📌 创建 Release"
              RELEASE_BODY=$(echo "$BODY" | jq -R -s '.')
              [ "$RELEASE_BODY" == "null" ] && RELEASE_BODY='""'
              RELEASE_NAME_JSON=$(echo "$RELEASE_NAME" | jq -R -s '.')
              [ "$RELEASE_NAME_JSON" == "null" ] && RELEASE_NAME_JSON='""'
              
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"tag_name\": \"$TAG_NAME\",
                  \"name\": $RELEASE_NAME_JSON,
                  \"body\": $RELEASE_BODY,
                  \"prerelease\": $PRERELEASE
                }" \
                "https://api.github.com/repos/$CURRENT_REPO/releases" > /dev/null
              echo "   ✅ Release 创建成功"
            fi
            
            # 处理制品
            echo "$RELEASE_EXISTS" | jq -c '.assets[]' 2>/dev/null | while read asset; do
              ASSET_NAME=$(echo $asset | jq -r '.name')
              ASSET_URL=$(echo $asset | jq -r '.browser_download_url')
              [ -z "$ASSET_NAME" ] || [ "$ASSET_NAME" == "null" ] && continue
              
              echo "     📥 下载: $ASSET_NAME"
              wget -q --tries=3 --timeout=300 "$ASSET_URL" -O "$ASSET_NAME" || continue
              
              echo "     📤 上传: $ASSET_NAME"
              gh release upload "$TAG_NAME" "$ASSET_NAME" --clobber --repo "$CURRENT_REPO" || true
              
              rm -f "$ASSET_NAME"
            done
          done
          
          echo "✅ 所有 Release 同步完成"

      # ============================================
      # 步骤10: 清理
      # ============================================
      - name: 🧹 清理
        run: |
          git remote prune upstream
          git fetch --all --prune

      # ============================================
      # 步骤11: 仓库保活
      # ============================================
      - name: 💚 仓库保活
        id: keepalive
        run: |
          echo "=========================================="
          echo "💚 执行仓库保活"
          echo "=========================================="
          
          CURRENT_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "当前时间: $CURRENT_TIME"
          
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if [[ "$LAST_COMMIT_MSG" == *"[skip ci] keepalive"* ]]; then
            echo "最近提交已是保活提交，跳过"
          else
            echo "创建保活空提交..."
            git commit --allow-empty -m "[skip ci] keepalive: 仓库保活 $(date -u '+%Y-%m-%d')"
            git push origin $(git branch --show-current)
            echo "✅ 保活提交已推送"
          fi
          
          echo "✅ 仓库保活完成"

      # ============================================
      # 步骤12: 验证
      # ============================================
      - name: ✅ 验证同步结果
        if: github.event.inputs.skip_release_sync != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "=========================================="
          echo "✅ 验证同步结果"
          echo "=========================================="
          
          CURRENT_REPO="${{ github.repository }}"
          
          RELEASES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$CURRENT_REPO/releases?per_page=100")
          
          RELEASE_COUNT=$(echo "$RELEASES" | jq '. | length')
          echo "📊 当前仓库 Release 数量: $RELEASE_COUNT"

      # ============================================
      # 步骤13: 结果
      # ============================================
      - name: 📢 执行结果
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 同步任务执行成功！"
          else
            echo "❌ 同步任务执行失败，请检查上方日志"
            exit 1
          fi
