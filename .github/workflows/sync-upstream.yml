# ============================================================
# 配置区域
# ============================================================

name: Sync Upstream & Keep Alive

# ============================================================
# 环境变量配置
# ============================================================
env:
  UPSTREAM_REPO: ""
  SYNC_MODE: "force"
  SYNC_LATEST_ONLY: "true"
  JOB_TIMEOUT_MINUTES: "30"

# ============================================================
# 触发器配置
# ============================================================

on:
  workflow_dispatch:
    inputs:
      sync_mode_override:
        description: '🔁 覆盖同步模式'
        required: false
        default: 'force'
        type: choice
        options:
          - 'incremental'
          - 'force'
      sync_latest_only:
        description: '📌 只同步最新 Release'
        required: false
        default: 'true'
        type: boolean
      skip_code_sync:
        description: '⏭️ 跳过代码同步'
        required: false
        default: 'false'
        type: boolean
      skip_release_sync:
        description: '⏭️ 跳过 Release 同步'
        required: false
        default: 'false'
        type: boolean
      disable_upstream_actions:
        description: '🚫 禁用上游仓库的 Actions'
        required: false
        default: 'true'
        type: boolean
      cleanup_old_releases:
        description: '🧹 清理旧 Release（只保留最新）'
        required: false
        default: 'true'
        type: boolean
  
  schedule:
    - cron: "0 3 */5 * *"

# ============================================================
# 任务配置
# ============================================================

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: write
      actions: write
      pull-requests: write
      issues: write
    
    concurrency:
      group: sync-upstream
      cancel-in-progress: false

    steps:
      # ============================================
      # 步骤1: 检出复刻仓库
      # ============================================
      - name: 📥 检出复刻仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      # ============================================
      # 步骤2: 自动检测上游仓库
      # ============================================
      - name: 🔍 自动检测上游仓库
        id: detect_upstream
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "=========================================="
          echo "🔍 自动检测上游仓库"
          echo "=========================================="
          
          MANUAL_UPSTREAM="${{ env.UPSTREAM_REPO }}"
          
          if [ -n "$MANUAL_UPSTREAM" ] && [ "$MANUAL_UPSTREAM" != "" ]; then
            echo "📌 使用手动配置: $MANUAL_UPSTREAM"
            echo "upstream_repo=$MANUAL_UPSTREAM" >> $GITHUB_OUTPUT
            echo "detected=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          CURRENT_REPO="${{ github.repository }}"
          echo "当前仓库: $CURRENT_REPO"
          
          REPO_INFO=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$CURRENT_REPO")
          
          IS_FORK=$(echo "$REPO_INFO" | jq -r '.fork')
          
          if [ "$IS_FORK" != "true" ]; then
            echo "⚠️ 当前仓库不是复刻仓库"
            echo "请手动设置 UPSTREAM_REPO"
            exit 1
          fi
          
          PARENT_REPO=$(echo "$REPO_INFO" | jq -r '.parent.full_name')
          
          if [ -z "$PARENT_REPO" ] || [ "$PARENT_REPO" == "null" ]; then
            echo "❌ 无法获取父仓库信息"
            exit 1
          fi
          
          echo "✅ 自动检测到上游仓库: $PARENT_REPO"
          echo "upstream_repo=$PARENT_REPO" >> $GITHUB_OUTPUT
          echo "detected=true" >> $GITHUB_OUTPUT

      # ============================================
      # 步骤3: 显示配置信息
      # ============================================
      - name: 📋 显示配置信息
        run: |
          UPSTREAM="${{ steps.detect_upstream.outputs.upstream_repo }}"
          
          echo "=========================================="
          echo "📋 同步配置信息"
          echo "=========================================="
          echo "当前仓库: ${{ github.repository }}"
          echo "上游仓库: ${UPSTREAM:-未检测到}"
          echo "同步模式: ${{ github.event.inputs.sync_mode_override || env.SYNC_MODE }}"
          echo "只同步最新: ${{ github.event.inputs.sync_latest_only || env.SYNC_LATEST_ONLY }}"
          echo "=========================================="
          
          if [ -z "$UPSTREAM" ]; then
            echo "❌ 未检测到上游仓库"
            exit 1
          fi

      # ============================================
      # 步骤4: 配置 Git（不设置 extraheader）
      # ============================================
      - name: ⚙️ 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "✅ Git 配置完成"

      # ============================================
      # 步骤5: 添加上游仓库
      # ============================================
      - name: 🔗 添加上游仓库
        run: |
          UPSTREAM_REPO="${{ steps.detect_upstream.outputs.upstream_repo }}"
          UPSTREAM_URL="https://${{ github.token }}@github.com/${UPSTREAM_REPO}.git"
          
          echo "上游仓库: $UPSTREAM_REPO"
          git remote add upstream $UPSTREAM_URL || git remote set-url upstream $UPSTREAM_URL
          
          # 获取上游所有信息（包括分支）
          git fetch upstream --tags --prune --force
          git fetch upstream --prune
          
          echo "✅ 上游仓库添加成功"
          echo ""
          echo "📌 上游分支:"
          git branch -r | grep upstream | head -3
          echo ""
          echo "📌 上游 Tags:"
          git ls-remote --tags upstream | grep -v '\^{}' | tail -5

      # ============================================
      # 步骤6: 获取上游默认分支的 commit SHA
      # ============================================
      - name: 🔍 获取上游 commit SHA
        id: get_sha
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          UPSTREAM_REPO="${{ steps.detect_upstream.outputs.upstream_repo }}"

          echo "=========================================="
          echo "🔍 获取上游 commit SHA"
          echo "=========================================="

          # 通过 API 获取上游仓库的默认分支
          REPO_HTTP=$(curl -s -o /tmp/repo_info.json -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$UPSTREAM_REPO")

          echo "📡 仓库信息 API HTTP: $REPO_HTTP"
          if [ "$REPO_HTTP" != "200" ]; then
            echo "❌ 获取仓库信息失败"
            cat /tmp/repo_info.json | head -c 300
            echo ""
            exit 1
          fi

          DEFAULT_BRANCH=$(cat /tmp/repo_info.json | jq -r '.default_branch')
          if [ "$DEFAULT_BRANCH" == "null" ] || [ -z "$DEFAULT_BRANCH" ]; then
            echo "❌ 无法获取默认分支"
            exit 1
          fi
          echo "默认分支: $DEFAULT_BRANCH"

          # 获取默认分支的最新 commit SHA
          BRANCH_HTTP=$(curl -s -o /tmp/branch_info.json -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$UPSTREAM_REPO/branches/$DEFAULT_BRANCH")

          echo "📡 分支信息 API HTTP: $BRANCH_HTTP"
          if [ "$BRANCH_HTTP" != "200" ]; then
            echo "❌ 获取分支信息失败"
            cat /tmp/branch_info.json | head -c 300
            echo ""
            exit 1
          fi

          COMMIT_SHA=$(cat /tmp/branch_info.json | jq -r '.commit.sha')
          if [ "$COMMIT_SHA" == "null" ] || [ -z "$COMMIT_SHA" ]; then
            echo "❌ 无法获取 commit SHA"
            exit 1
          fi
          echo "最新 commit SHA: $COMMIT_SHA"

          echo "default_branch=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT

      # ============================================
      # 步骤6.5: 同步上游代码到 fork（关键！否则 tag 指向的 commit 不存在）
      # ============================================
      - name: 🔄 同步上游代码
        if: github.event.inputs.skip_code_sync != 'true'
        env:
          TARGET_SHA: ${{ steps.get_sha.outputs.commit_sha }}
          DEFAULT_BRANCH: ${{ steps.get_sha.outputs.default_branch }}
        run: |
          echo "=========================================="
          echo "🔄 同步上游代码到 fork"
          echo "=========================================="
          echo "默认分支: $DEFAULT_BRANCH"
          echo "目标 SHA: $TARGET_SHA"

          # 检查当前分支
          CURRENT_BRANCH=$(git branch --show-current)
          echo "当前分支: $CURRENT_BRANCH"

          # 检查目标 commit 是否已存在于本地
          if git cat-file -t "$TARGET_SHA" > /dev/null 2>&1; then
            echo "✅ 目标 commit 已存在于本地仓库"
          else
            echo "⚠️ 目标 commit 不存在于本地，需要同步上游代码..."

            # 配置上游 remote（步骤5已配置，这里确保可用）
            git fetch upstream "$DEFAULT_BRANCH" --force

            # 合并上游最新代码到当前分支
            git merge "upstream/$DEFAULT_BRANCH" --no-edit || {
              echo "⚠️ 自动合并失败，尝试强制重置到上游最新状态..."
              git reset --hard "upstream/$DEFAULT_BRANCH"
            }

            # 推送到 fork
            git push origin "$CURRENT_BRANCH" --force-with-lease || git push origin "$CURRENT_BRANCH" --force
            echo "✅ 代码同步完成"
          fi

      # ============================================
      # 步骤7: 禁用上游 Actions
      # ============================================
      - name: 🚫 禁用上游 Actions
        if: github.event.inputs.disable_upstream_actions == 'true'
        continue-on-error: true
        run: |
          echo "=========================================="
          echo "🚫 禁用上游 Actions"
          echo "=========================================="
          
          if [ ! -d ".github/workflows" ]; then
            echo "⚠️ .github/workflows 目录不存在"
            exit 0
          fi
          
          find .github/workflows -maxdepth 1 -name "*.yml" -o -name "*.yaml" | while read file; do
            filename=$(basename "$file")
            if [ "$filename" == "sync-upstream.yml" ] || [ "$filename" == "sync-upstream.yaml" ]; then
              echo "   🔒 保护: $file"
              continue
            fi
            new_file="${file}.disabled"
            echo "   🚫 禁用: $file → $new_file"
            mv "$file" "$new_file"
          done
          
          if git status --porcelain | grep -q ".github/workflows"; then
            git add .github/workflows/
            git commit -m "[skip ci] 禁用上游 Actions"
            git push origin $(git branch --show-current)
            echo "✅ 更改已提交"
          else
            echo "✅ 没有需要禁用的 Actions"
          fi

      # ============================================
      # 步骤8: 检查上游 Release
      # ============================================
      - name: 🔍 检查上游 Release
        id: check_releases
        if: github.event.inputs.skip_release_sync != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          UPSTREAM_REPO="${{ steps.detect_upstream.outputs.upstream_repo }}"
          SYNC_LATEST_ONLY="${{ github.event.inputs.sync_latest_only || env.SYNC_LATEST_ONLY }}"

          echo "=========================================="
          echo "🔍 检查上游: $UPSTREAM_REPO"
          echo "只同步最新: $SYNC_LATEST_ONLY"
          echo "=========================================="

          # 调用 API 并捕获 HTTP 状态码
          HTTP_CODE=$(curl -s -o /tmp/upstream_releases_raw.json -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$UPSTREAM_REPO/releases?per_page=100")

          echo "📡 API HTTP 状态码: $HTTP_CODE"
          echo "📄 响应前 300 字符:"
          head -c 300 /tmp/upstream_releases_raw.json
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ API 调用失败 (HTTP $HTTP_CODE)"
            echo "release_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          ALL_RELEASES=$(cat /tmp/upstream_releases_raw.json)

          # 校验是否为合法 JSON
          if ! echo "$ALL_RELEASES" | jq empty 2>/dev/null; then
            echo "❌ API 响应不是合法 JSON"
            echo "   完整响应: $(head -c 500 /tmp/upstream_releases_raw.json)"
            echo "release_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          TOTAL_COUNT=$(echo "$ALL_RELEASES" | jq '. | length')
          echo "📊 上游总 Release 数量: $TOTAL_COUNT"

          if [ "$TOTAL_COUNT" -eq 0 ]; then
            echo "⚠️ 上游没有 Release"
            echo "release_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$SYNC_LATEST_ONLY" == "true" ]; then
            RELEASES=$(echo "$ALL_RELEASES" | jq '[.[0]]')
            RELEASE_COUNT=1
            LATEST_TAG=$(echo "$RELEASES" | jq -r '.[0].tag_name')
            echo "📌 最新 Release: $LATEST_TAG"
          else
            RELEASES="$ALL_RELEASES"
            RELEASE_COUNT="$TOTAL_COUNT"
          fi

          echo "$RELEASES" > /tmp/upstream_releases.json
          echo "release_count=$RELEASE_COUNT" >> $GITHUB_OUTPUT

      # ============================================
      # 步骤9: 同步 Releases（使用 git tag + gh release，无需 PAT）
      # ============================================
      - name: 📦 同步 Releases 与制品
        id: sync_releases
        if: github.event.inputs.skip_release_sync != 'true' && steps.check_releases.outputs.release_count > 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SYNC_MODE="${{ github.event.inputs.sync_mode_override || env.SYNC_MODE }}"
          CURRENT_REPO="${{ github.repository }}"
          RELEASE_COUNT="${{ steps.check_releases.outputs.release_count }}"
          TARGET_SHA="${{ steps.get_sha.outputs.commit_sha }}"

          echo "=========================================="
          echo "📦 同步 Releases"
          echo "=========================================="
          echo "同步模式: $SYNC_MODE"
          echo "Release 数量: $RELEASE_COUNT"
          echo "目标 commit SHA: $TARGET_SHA"
          echo "=========================================="

          if [ -z "$TARGET_SHA" ]; then
            echo "❌ 错误: 无法获取目标 commit SHA"
            exit 1
          fi

          RELEASES=$(cat /tmp/upstream_releases.json)

          echo "$RELEASES" | jq -c '.[]' | while read -r release; do
            TAG_NAME=$(echo "$release" | jq -r '.tag_name')
            RELEASE_NAME=$(echo "$release" | jq -r '.name')
            BODY=$(echo "$release" | jq -r '.body')
            PRERELEASE=$(echo "$release" | jq -r '.prerelease')
            ASSET_COUNT=$(echo "$release" | jq '.assets | length')

            echo ""
            echo "=========================================="
            echo "📌 Release: $TAG_NAME"
            echo "   制品数量: $ASSET_COUNT"
            echo "=========================================="

            # --- 创建 Tag（用 git 命令，不走 API，避免 403）---
            if git tag -l "$TAG_NAME" | grep -q .; then
              echo "   ⚠️ Tag 已存在"
              if [ "$SYNC_MODE" == "force" ]; then
                echo "   🔄 强制模式：删除并重建 Tag..."
                git tag -d "$TAG_NAME"
                git push origin ":refs/tags/$TAG_NAME" 2>/dev/null || true
              fi
            fi

            if ! git tag -l "$TAG_NAME" | grep -q .; then
              git tag "$TAG_NAME" "$TARGET_SHA"
              git push origin "$TAG_NAME"
              echo "   ✅ Tag 创建成功"
            fi

            # --- 处理 Release（用 gh release，不走 API，避免 403）---
            if gh release view "$TAG_NAME" --repo "$CURRENT_REPO" > /dev/null 2>&1; then
              echo "   ⚠️ Release 已存在"
              if [ "$SYNC_MODE" == "force" ]; then
                echo "   🔄 强制模式：删除并重建 Release..."
                gh release delete "$TAG_NAME" --yes --repo "$CURRENT_REPO" --cleanup-tag
                sleep 2
                # 重新创建 tag（上面被 --cleanup-tag 删了）
                git tag "$TAG_NAME" "$TARGET_SHA" 2>/dev/null || true
                git push origin "$TAG_NAME" 2>/dev/null || true
                echo "   ✅ Release 已删除"
              fi
            fi

            if ! gh release view "$TAG_NAME" --repo "$CURRENT_REPO" > /dev/null 2>&1; then
              echo "   📌 创建 Release"

              # 把 body 写入临时文件，避免 shell 转义问题
              BODY_FILE="/tmp/release_body_${TAG_NAME}.md"
              printf '%s' "$BODY" > "$BODY_FILE"

              PRERELEASE_FLAG=""
              if [ "$PRERELEASE" == "true" ]; then
                PRERELEASE_FLAG="--prerelease"
              fi

              if gh release create "$TAG_NAME" \
                --repo "$CURRENT_REPO" \
                --target "$TARGET_SHA" \
                --title "$RELEASE_NAME" \
                --notes-file "$BODY_FILE" \
                $PRERELEASE_FLAG; then
                echo "   ✅ Release 创建成功"
              else
                echo "   ❌ Release 创建失败"
                rm -f "$BODY_FILE"
                continue
              fi

              rm -f "$BODY_FILE"
            fi

            # --- 处理制品 ---
            if [ "$ASSET_COUNT" -eq 0 ] || [ "$ASSET_COUNT" == "null" ]; then
              echo "   ⚠️ 没有制品文件"
              continue
            fi

            echo "   📦 处理 $ASSET_COUNT 个制品..."
            echo "$release" | jq -c '.assets[]' | while read -r asset; do
              ASSET_NAME=$(echo "$asset" | jq -r '.name')
              ASSET_URL=$(echo "$asset" | jq -r '.browser_download_url')
              ASSET_SIZE=$(echo "$asset" | jq -r '.size')

              [ -z "$ASSET_NAME" ] || [ "$ASSET_NAME" == "null" ] && continue

              if [[ "$ASSET_NAME" == *"Source code"* ]] || [[ "$ASSET_NAME" == *"源码"* ]]; then
                echo "     ⏭️ 跳过源码包: $ASSET_NAME"
                continue
              fi

              echo "     📥 下载: $ASSET_NAME ($ASSET_SIZE bytes)"

              curl -L --fail -s -o "$ASSET_NAME" \
                --connect-timeout 30 --max-time 1800 \
                "$ASSET_URL" || {
                echo "     ❌ 下载失败: $ASSET_NAME"
                rm -f "$ASSET_NAME"
                continue
              }

              if [ ! -s "$ASSET_NAME" ]; then
                echo "     ❌ 下载文件为空: $ASSET_NAME"
                rm -f "$ASSET_NAME"
                continue
              fi

              ACTUAL_SIZE=$(stat -c%s "$ASSET_NAME" 2>/dev/null || echo 0)
              echo "     📦 实际大小: ${ACTUAL_SIZE} bytes"

              echo "     📤 上传: $ASSET_NAME"
              if gh release upload "$TAG_NAME" "$ASSET_NAME" --clobber --repo "$CURRENT_REPO"; then
                echo "     ✅ 上传完成"
              else
                echo "     ❌ 上传失败: $ASSET_NAME"
              fi

              rm -f "$ASSET_NAME"
            done
          done

          echo ""
          echo "✅ 所有 Release 同步完成"
          echo "sync_success=true" >> $GITHUB_OUTPUT

      # ============================================
      # 步骤10: 清理旧 Releases（只保留最新）
      # ============================================
      - name: 🧹 清理旧 Releases（只保留最新）
        id: cleanup
        if: |
          github.event.inputs.cleanup_old_releases == 'true' &&
          github.event.inputs.skip_release_sync != 'true' &&
          steps.check_releases.outputs.release_count > 0 &&
          steps.sync_releases.outputs.sync_success == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=========================================="
          echo "🧹 清理旧 Releases（只保留最新）"
          echo "=========================================="

          CURRENT_REPO="${{ github.repository }}"

          RELEASE_LIST=$(gh release list --repo "$CURRENT_REPO" --limit 100 --json tagName)

          TOTAL_COUNT=$(echo "$RELEASE_LIST" | jq '. | length')

          if [ "$TOTAL_COUNT" -le 1 ]; then
            echo "📌 Release 数量: $TOTAL_COUNT，无需清理"
            exit 0
          fi

          echo "📊 当前 Release 数量: $TOTAL_COUNT"

          LATEST_TAG=$(echo "$RELEASE_LIST" | jq -r '.[0].tagName')

          echo "📌 最新 Release: $LATEST_TAG"
          echo ""

          DELETED_COUNT=0

          echo "$RELEASE_LIST" | jq -c '.[]' | while read -r release; do
            TAG_NAME=$(echo "$release" | jq -r '.tagName')

            if [ "$TAG_NAME" != "$LATEST_TAG" ]; then
              echo "   🗑️ 删除: $TAG_NAME"
              gh release delete "$TAG_NAME" --yes --repo "$CURRENT_REPO" --cleanup-tag 2>/dev/null || true
              DELETED_COUNT=$((DELETED_COUNT + 1))
            fi
          done

          echo ""
          echo "✅ 清理完成"
          echo "   删除: $DELETED_COUNT"
          echo "   保留: $LATEST_TAG"

      # ============================================
      # 步骤11: 验证
      # ============================================
      - name: ✅ 验证同步结果
        if: github.event.inputs.skip_release_sync != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=========================================="
          echo "✅ 验证同步结果"
          echo "=========================================="

          CURRENT_REPO="${{ github.repository }}"

          gh release list --repo "$CURRENT_REPO" --limit 10

      # ============================================
      # 步骤12: 结果
      # ============================================
      - name: 📢 结果
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 同步完成"
          else
            echo "⚠️ 同步部分失败"
          fi

  # ============================================
  # 保活任务
  # ============================================
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    permissions:
      contents: write
    
    needs: sync
    if: always()
    
    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: ⚙️ 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 💚 仓库保活
        run: |
          echo "=========================================="
          echo "💚 仓库保活"
          echo "=========================================="
          
          CURRENT_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "当前时间: $CURRENT_TIME"
          
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if [[ "$LAST_COMMIT_MSG" == *"[skip ci] keepalive"* ]]; then
            echo "最近提交已是保活提交，跳过"
          else
            echo "创建保活空提交..."
            git commit --allow-empty -m "[skip ci] keepalive: 仓库保活 $(date -u '+%Y-%m-%d')"
            git push origin $(git branch --show-current)
            echo "✅ 保活提交已推送"
          fi
          
          echo "✅ 保活完成"

      - name: 📢 保活结果
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 保活成功"
          else
            echo "❌ 保活失败"
            exit 1
          fi
