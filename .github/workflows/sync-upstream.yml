# ============================================================
# 配置区域 - 自动检测上游仓库
# ============================================================

name: Sync Upstream & Keep Alive

# ============================================================
# 环境变量配置
# ============================================================
env:
  # 【可选】留空则自动检测上游仓库
  UPSTREAM_REPO: ""
  
  # 同步模式: "incremental" 或 "force"  
  SYNC_MODE: "force"
  
  # 合并策略: "ours" 或 "theirs"
  MERGE_STRATEGY: "ours"
  
  # 只同步最新的 Release
  SYNC_LATEST_ONLY: "true"
  
  # 任务超时时间（分钟）
  JOB_TIMEOUT_MINUTES: "30"

# ============================================================
# 触发器配置
# ============================================================

on:
  workflow_dispatch:
    inputs:
      sync_mode_override:
        description: '🔁 覆盖同步模式'
        required: false
        default: 'force'
        type: choice
        options:
          - 'incremental'
          - 'force'
      sync_latest_only:
        description: '📌 只同步最新 Release'
        required: false
        default: 'true'
        type: boolean
      skip_code_sync:
        description: '⏭️ 跳过代码同步'
        required: false
        default: 'false'
        type: boolean
      skip_release_sync:
        description: '⏭️ 跳过 Release 同步'
        required: false
        default: 'false'
        type: boolean
      disable_upstream_actions:
        description: '🚫 禁用上游仓库的 Actions'
        required: false
        default: 'true'
        type: boolean
      cleanup_old_tags:
        description: '🧹 清理本地历史 Tags（只保留最新）'
        required: false
        default: 'true'
        type: boolean
  
  schedule:
    - cron: "0 3 */5 * *"

# ============================================================
# 任务配置
# ============================================================

jobs:
  # ============================================
  # 主同步任务
  # ============================================
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: write
      actions: write
      issues: write
      pull-requests: write
    
    concurrency:
      group: sync-upstream
      cancel-in-progress: false

    steps:
      # ============================================
      # 步骤0: 检查 PAT_TOKEN 是否配置
      # ============================================
      - name: 🔑 检查 PAT_TOKEN
        id: check_token
        run: |
          echo "=========================================="
          echo "🔑 检查 PAT_TOKEN 配置"
          echo "=========================================="
          
          if [ -n "${{ secrets.PAT_TOKEN }}" ]; then
            echo "✅ PAT_TOKEN 已配置"
            echo "token_configured=true" >> $GITHUB_OUTPUT
          else
            echo "❌ PAT_TOKEN 未配置！"
            echo ""
            echo "请按以下步骤配置："
            echo "1. GitHub Settings → Developer settings → Personal access tokens → Tokens (classic)"
            echo "2. Generate new token (classic)"
            echo "3. 勾选权限: repo (全部) 和 workflow"
            echo "4. 复制 token"
            echo "5. 在仓库 Settings → Secrets and variables → Actions 中添加 PAT_TOKEN"
            echo ""
            echo "⚠️ 没有 PAT_TOKEN 将无法推送 Tags（GITHUB_TOKEN 没有 workflows 权限）"
            exit 1
          fi

      # ============================================
      # 步骤1: 检出复刻仓库（使用 PAT）
      # ============================================
      - name: 📥 检出复刻仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}  # 强制使用 PAT
          persist-credentials: true

      # ============================================
      # 步骤2: 自动检测上游仓库
      # ============================================
      - name: 🔍 自动检测上游仓库
        id: detect_upstream
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}  # 强制使用 PAT
        run: |
          echo "=========================================="
          echo "🔍 自动检测上游仓库"
          echo "=========================================="
          
          MANUAL_UPSTREAM="${{ env.UPSTREAM_REPO }}"
          
          if [ -n "$MANUAL_UPSTREAM" ] && [ "$MANUAL_UPSTREAM" != "" ]; then
            echo "📌 使用手动配置: $MANUAL_UPSTREAM"
            echo "upstream_repo=$MANUAL_UPSTREAM" >> $GITHUB_OUTPUT
            echo "detected=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          CURRENT_REPO="${{ github.repository }}"
          echo "当前仓库: $CURRENT_REPO"
          
          REPO_INFO=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$CURRENT_REPO")
          
          IS_FORK=$(echo "$REPO_INFO" | jq -r '.fork')
          
          if [ "$IS_FORK" != "true" ]; then
            echo "⚠️ 当前仓库不是复刻仓库"
            echo "请手动设置 UPSTREAM_REPO"
            exit 1
          fi
          
          PARENT_REPO=$(echo "$REPO_INFO" | jq -r '.parent.full_name')
          
          if [ -z "$PARENT_REPO" ] || [ "$PARENT_REPO" == "null" ]; then
            echo "❌ 无法获取父仓库信息"
            exit 1
          fi
          
          echo "✅ 自动检测到上游仓库: $PARENT_REPO"
          echo "upstream_repo=$PARENT_REPO" >> $GITHUB_OUTPUT
          echo "detected=true" >> $GITHUB_OUTPUT

      # ============================================
      # 步骤3: 显示配置信息
      # ============================================
      - name: 📋 显示配置信息
        run: |
          UPSTREAM="${{ steps.detect_upstream.outputs.upstream_repo }}"
          
          echo "=========================================="
          echo "📋 同步配置信息"
          echo "=========================================="
          echo "当前仓库: ${{ github.repository }}"
          echo "上游仓库: ${UPSTREAM:-未检测到}"
          echo "同步模式: ${{ github.event.inputs.sync_mode_override || env.SYNC_MODE }}"
          echo "只同步最新: ${{ github.event.inputs.sync_latest_only || env.SYNC_LATEST_ONLY }}"
          echo "清理旧Tags: ${{ github.event.inputs.cleanup_old_tags || 'true' }}"
          echo "禁用上游Actions: ${{ github.event.inputs.disable_upstream_actions || 'true' }}"
          echo "=========================================="
          
          if [ -z "$UPSTREAM" ]; then
            echo "❌ 未检测到上游仓库"
            exit 1
          fi

      # ============================================
      # 步骤4: 配置 Git（不设置 extraheader）
      # ============================================
      - name: ⚙️ 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "✅ Git 配置完成"

      # ============================================
      # 步骤5: 添加上游仓库（使用 PAT）
      # ============================================
      - name: 🔗 添加上游仓库
        id: add_upstream
        run: |
          UPSTREAM_REPO="${{ steps.detect_upstream.outputs.upstream_repo }}"
          TOKEN="${{ secrets.PAT_TOKEN }}"
          UPSTREAM_URL="https://${TOKEN}@github.com/${UPSTREAM_REPO}.git"
          
          echo "上游仓库: $UPSTREAM_REPO"
          echo "使用 PAT 认证..."
          
          retry() {
            local max_attempts=3
            local attempt=1
            local exit_code=0
            
            while [ $attempt -le $max_attempts ]; do
              echo "尝试 $attempt/$max_attempts..."
              if eval "$@"; then
                echo "✅ 成功！"
                return 0
              else
                exit_code=$?
                echo "⚠️ 失败 (exit code: $exit_code)"
                if [ $attempt -lt $max_attempts ]; then
                  echo "等待 5 秒后重试..."
                  sleep 5
                fi
                attempt=$((attempt + 1))
              fi
            done
            
            echo "❌ 所有 $max_attempts 次尝试均失败"
            return $exit_code
          }
          
          retry "git remote add upstream $UPSTREAM_URL || git remote set-url upstream $UPSTREAM_URL"
          retry "git fetch upstream --tags --prune --force"
          retry "git fetch upstream --prune"
          
          echo "✅ 上游仓库添加成功"

      # ============================================
      # 步骤6: 清理本地历史 Tags
      # ============================================
      - name: 🧹 清理本地历史 Tags
        if: github.event.inputs.cleanup_old_tags == 'true'
        run: |
          echo "=========================================="
          echo "🧹 清理本地历史 Tags"
          echo "=========================================="
          
          LATEST_TAG=$(git ls-remote --tags upstream | grep -v '\^{}' | sort -V | tail -n1 | awk -F'/' '{print $NF}')
          
          if [ -z "$LATEST_TAG" ]; then
            echo "⚠️ 无法获取最新 Tag"
            exit 0
          fi
          
          echo "📌 最新 Tag: $LATEST_TAG"
          
          LOCAL_TAGS=$(git tag -l)
          
          if [ -z "$LOCAL_TAGS" ]; then
            echo "📌 没有本地 Tags"
            exit 0
          fi
          
          DELETED_COUNT=0
          KEPT_COUNT=0
          
          for tag in $LOCAL_TAGS; do
            if [ "$tag" != "$LATEST_TAG" ]; then
              if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
                echo "   🗑️ 删除本地 Tag: $tag"
                git tag -d "$tag" 2>/dev/null || true
                DELETED_COUNT=$((DELETED_COUNT + 1))
                
                if git ls-remote --tags origin "$tag" | grep -q "$tag"; then
                  echo "      📤 删除远程 Tag: $tag"
                  git push origin --delete "$tag" 2>/dev/null || true
                else
                  echo "      ⏭️ 远程 Tag 不存在: $tag"
                fi
              else
                echo "   ⏭️ Tag 不存在: $tag"
              fi
            else
              echo "   ✅ 保留: $tag (最新)"
              KEPT_COUNT=$((KEPT_COUNT + 1))
            fi
          done
          
          echo ""
          echo "✅ 清理完成"
          echo "   删除本地 Tags: $DELETED_COUNT"
          echo "   保留 Tags: $KEPT_COUNT"

      # ============================================
      # 步骤7: 禁用上游 Actions
      # ============================================
      - name: 🚫 禁用上游 Actions
        if: github.event.inputs.disable_upstream_actions == 'true'
        continue-on-error: true
        run: |
          echo "=========================================="
          echo "🚫 禁用上游 Actions"
          echo "=========================================="
          
          if [ ! -d ".github/workflows" ]; then
            echo "⚠️ .github/workflows 目录不存在"
            exit 0
          fi
          
          CURRENT_WORKFLOW_FILE="sync-upstream.yml"
          SAFE_NAMES="sync-upstream.yml sync-upstream.yaml"
          
          find .github/workflows -maxdepth 1 -name "*.yml" -o -name "*.yaml" | while read file; do
            filename=$(basename "$file")
            
            is_safe=false
            for safe_name in $SAFE_NAMES; do
              if [ "$filename" == "$safe_name" ]; then
                is_safe=true
                break
              fi
            done
            
            if [ "$is_safe" == "true" ]; then
              echo "   🔒 保护: $file"
              continue
            fi
            
            if [[ "$filename" == *.disabled ]]; then
              echo "   ⏭️ 已禁用: $file"
              continue
            fi
            
            new_file="${file}.disabled"
            echo "   🚫 禁用: $file → $new_file"
            mv "$file" "$new_file"
          done
          
          if git status --porcelain | grep -q ".github/workflows"; then
            git add .github/workflows/
            git commit -m "[skip ci] 禁用上游 Actions"
            git push origin $(git branch --show-current)
            echo "✅ 更改已提交"
          else
            echo "✅ 没有需要禁用的 Actions"
          fi

      # ============================================
      # 步骤8: 合并上游代码
      # ============================================
      - name: 🔄 合并上游代码
        id: merge
        if: github.event.inputs.skip_code_sync != 'true'
        run: |
          CURRENT_BRANCH=$(git branch --show-current)
          echo "当前分支: $CURRENT_BRANCH"
          
          UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | cut -d' ' -f5)
          echo "上游默认分支: $UPSTREAM_BRANCH"
          
          MERGE_STRATEGY="${{ env.MERGE_STRATEGY }}"
          
          retry() {
            local max_attempts=3
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              echo "尝试 $attempt/$max_attempts..."
              if eval "$@"; then
                return 0
              else
                echo "⚠️ 失败，等待 5 秒后重试..."
                sleep 5
              fi
              attempt=$((attempt + 1))
            done
            return 1
          }
          
          retry "git pull upstream $UPSTREAM_BRANCH --no-edit" || {
            echo "合并冲突，使用 $MERGE_STRATEGY 策略..."
            retry "git pull upstream $UPSTREAM_BRANCH -X recursive -X $MERGE_STRATEGY --no-edit" || {
              echo "❌ 合并失败"
              exit 1
            }
          }
          
          git push origin $CURRENT_BRANCH
          echo "✅ 代码同步完成"

      # ============================================
      # 步骤9: 检查上游 Release
      # ============================================
      - name: 🔍 检查上游 Release
        id: check_releases
        if: github.event.inputs.skip_release_sync != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          UPSTREAM_REPO="${{ steps.detect_upstream.outputs.upstream_repo }}"
          SYNC_LATEST_ONLY="${{ github.event.inputs.sync_latest_only || env.SYNC_LATEST_ONLY }}"
          
          echo "=========================================="
          echo "🔍 检查上游: $UPSTREAM_REPO"
          echo "只同步最新: $SYNC_LATEST_ONLY"
          echo "=========================================="
          
          REPO_CHECK=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$UPSTREAM_REPO")
          
          if [ "$REPO_CHECK" != "200" ]; then
            echo "❌ 上游仓库不存在！HTTP: $REPO_CHECK"
            exit 1
          fi
          echo "✅ 上游仓库可访问"
          
          ALL_RELEASES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$UPSTREAM_REPO/releases?per_page=100")
          
          TOTAL_COUNT=$(echo "$ALL_RELEASES" | jq '. | length')
          echo "📊 上游总 Release 数量: $TOTAL_COUNT"
          
          if [ "$TOTAL_COUNT" -eq 0 ]; then
            echo "⚠️ 没有 Release"
            echo "release_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ "$SYNC_LATEST_ONLY" == "true" ]; then
            RELEASES=$(echo "$ALL_RELEASES" | jq '[.[0]]')
            RELEASE_COUNT=1
            LATEST_TAG=$(echo "$RELEASES" | jq -r '.[0].tag_name')
            echo "📌 最新 Release: $LATEST_TAG"
            
            ASSET_COUNT=$(echo "$RELEASES" | jq '.[0].assets | length')
            echo "📦 制品数量: $ASSET_COUNT"
          else
            RELEASES="$ALL_RELEASES"
            RELEASE_COUNT="$TOTAL_COUNT"
          fi
          
          echo "$RELEASES" > /tmp/upstream_releases.json
          echo "release_count=$RELEASE_COUNT" >> $GITHUB_OUTPUT

      # ============================================
      # 步骤10: 同步 Releases（使用 PAT 推送）
      # ============================================
      - name: 📦 同步 Releases 与制品
        id: sync_releases
        if: github.event.inputs.skip_release_sync != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -e
          
          SYNC_MODE="${{ github.event.inputs.sync_mode_override || env.SYNC_MODE }}"
          CURRENT_REPO="${{ github.repository }}"
          RELEASE_COUNT="${{ steps.check_releases.outputs.release_count }}"
          TOKEN="${{ secrets.PAT_TOKEN }}"
          
          retry() {
            local max_attempts=3
            local attempt=1
            local exit_code=0
            
            while [ $attempt -le $max_attempts ]; do
              echo "   尝试 $attempt/$max_attempts..."
              if eval "$@"; then
                echo "   ✅ 成功！"
                return 0
              else
                exit_code=$?
                echo "   ⚠️ 失败 (exit code: $exit_code)"
                if [ $attempt -lt $max_attempts ]; then
                  echo "   等待 5 秒后重试..."
                  sleep 5
                fi
                attempt=$((attempt + 1))
              fi
            done
            
            echo "   ❌ 所有 $max_attempts 次尝试均失败"
            return $exit_code
          }
          
          echo "=========================================="
          echo "📦 同步 Releases"
          echo "=========================================="
          echo "同步模式: $SYNC_MODE"
          echo "Release 数量: $RELEASE_COUNT"
          echo "=========================================="
          
          if [ "$RELEASE_COUNT" -eq 0 ]; then
            echo "⚠️ 没有 Release 需要同步"
            exit 0
          fi
          
          RELEASES=$(cat /tmp/upstream_releases.json)
          
          echo "$RELEASES" | jq -c '.[]' | while read release; do
            TAG_NAME=$(echo $release | jq -r '.tag_name')
            RELEASE_NAME=$(echo $release | jq -r '.name')
            BODY=$(echo $release | jq -r '.body')
            PRERELEASE=$(echo $release | jq -r '.prerelease')
            TARGET_SHA=$(echo $release | jq -r '.target_commitish')
            PUBLISHED_AT=$(echo $release | jq -r '.published_at')
            ASSET_COUNT=$(echo $release | jq '.assets | length')
            
            echo ""
            echo "=========================================="
            echo "📌 Release: $TAG_NAME"
            echo "   发布时间: $PUBLISHED_AT"
            echo "   制品数量: $ASSET_COUNT"
            echo "=========================================="
            
            # --- 处理 Tag ---
            echo "   📌 从上游同步 Tag..."
            
            if git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
              echo "   🗑️ 删除本地 Tag"
              git tag -d "$TAG_NAME"
            fi
            
            retry "git fetch upstream 'refs/tags/$TAG_NAME:refs/tags/$TAG_NAME' --force" 2>/dev/null || {
              echo "   ⚠️ 无法直接 fetch Tag，通过 SHA 创建..."
              if [ "$TARGET_SHA" == "null" ] || [ -z "$TARGET_SHA" ]; then
                DEFAULT_BRANCH=$(git remote show upstream | grep 'HEAD branch' | cut -d' ' -f5)
                TARGET_SHA=$(git rev-parse upstream/$DEFAULT_BRANCH)
              fi
              git tag -f "$TAG_NAME" "$TARGET_SHA"
            }
            
            # --- 使用 PAT 推送 Tag ---
            echo "   📤 使用 PAT 推送 Tag 到 origin..."
            PUSH_URL="https://${TOKEN}@github.com/${CURRENT_REPO}"
            
            retry "git push '$PUSH_URL' 'refs/tags/${TAG_NAME}' -f" || {
              echo "   ❌ Tag 推送失败"
              echo ""
              echo "   🔍 请检查："
              echo "   1. PAT_TOKEN 是否有 repo 和 workflow 权限"
              echo "   2. PAT_TOKEN 是否正确添加到 Secrets"
              echo "   3. 当前是复刻仓库，确保有推送权限"
              echo ""
              echo "   📋 PAT_TOKEN 配置步骤："
              echo "   1. GitHub Settings → Developer settings → Personal access tokens → Tokens (classic)"
              echo "   2. Generate new token (classic)"
              echo "   3. 勾选权限: repo (全部) 和 workflow"
              echo "   4. 在仓库 Settings → Secrets → Actions 中添加 PAT_TOKEN"
              exit 1
            }
            echo "   ✅ Tag 推送成功"
            
            # --- 处理 Release ---
            RELEASE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$CURRENT_REPO/releases/tags/$TAG_NAME")
            
            if [ "$RELEASE_EXISTS" == "200" ]; then
              echo "   ⚠️ Release 已存在"
              if [ "$SYNC_MODE" == "force" ]; then
                echo "   🔄 强制模式：删除并重建 Release..."
                RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/$CURRENT_REPO/releases/tags/$TAG_NAME" | jq -r '.id')
                curl -X DELETE -s -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/$CURRENT_REPO/releases/$RELEASE_ID"
                echo "   ✅ Release 已删除"
                RELEASE_EXISTS="404"
              fi
            fi
            
            if [ "$RELEASE_EXISTS" != "200" ]; then
              echo "   📌 创建 Release"
              RELEASE_BODY=$(echo "$BODY" | jq -R -s '.')
              [ "$RELEASE_BODY" == "null" ] && RELEASE_BODY='""'
              RELEASE_NAME_JSON=$(echo "$RELEASE_NAME" | jq -R -s '.')
              [ "$RELEASE_NAME_JSON" == "null" ] && RELEASE_NAME_JSON='""'
              
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"tag_name\": \"$TAG_NAME\",
                  \"name\": $RELEASE_NAME_JSON,
                  \"body\": $RELEASE_BODY,
                  \"prerelease\": $PRERELEASE
                }" \
                "https://api.github.com/repos/$CURRENT_REPO/releases" > /dev/null
              echo "   ✅ Release 创建成功"
            fi
            
            # --- 处理制品 ---
            ASSETS=$(echo $release | jq -c '.assets[]')
            if [ -z "$ASSETS" ] || [ "$ASSETS" == "null" ]; then
              echo "   ⚠️ 没有制品文件需要同步"
              continue
            fi
            
            echo "   📦 处理制品..."
            echo "$ASSETS" | while read asset; do
              ASSET_NAME=$(echo $asset | jq -r '.name')
              ASSET_URL=$(echo $asset | jq -r '.browser_download_url')
              ASSET_SIZE=$(echo $asset | jq -r '.size')
              ASSET_SIZE_HR=$(numfmt --to=iec $ASSET_SIZE 2>/dev/null || echo "$ASSET_SIZE bytes")
              
              [ -z "$ASSET_NAME" ] || [ "$ASSET_NAME" == "null" ] && continue
              
              if [[ "$ASSET_NAME" == *"Source code"* ]] || [[ "$ASSET_NAME" == *"源码"* ]]; then
                echo "     ⏭️ 跳过源码包: $ASSET_NAME"
                continue
              fi
              
              echo "     📥 下载: $ASSET_NAME ($ASSET_SIZE_HR)"
              retry "wget -q --tries=3 --timeout=300 '$ASSET_URL' -O '$ASSET_NAME'" || {
                echo "     ❌ 下载失败"
                continue
              }
              
              echo "     📤 上传: $ASSET_NAME"
              retry "gh release upload '$TAG_NAME' '$ASSET_NAME' --clobber --repo '$CURRENT_REPO'" || {
                echo "     ⚠️ 上传失败，跳过"
              }
              
              rm -f "$ASSET_NAME"
              echo "     ✅ 上传完成"
            done
          done
          
          echo ""
          echo "✅ 所有 Release 同步完成"

      # ============================================
      # 步骤11: 清理
      # ============================================
      - name: 🧹 清理
        continue-on-error: true
        run: |
          git remote prune upstream
          git fetch --all --prune --force

      # ============================================
      # 步骤12: 验证结果
      # ============================================
      - name: ✅ 验证同步结果
        if: github.event.inputs.skip_release_sync != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "=========================================="
          echo "✅ 验证同步结果"
          echo "=========================================="
          
          CURRENT_REPO="${{ github.repository }}"
          
          RELEASES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$CURRENT_REPO/releases?per_page=100")
          
          RELEASE_COUNT=$(echo "$RELEASES" | jq '. | length')
          echo "📊 当前 Release 数量: $RELEASE_COUNT"
          
          if [ "$RELEASE_COUNT" -gt 0 ]; then
            echo "📌 Release 列表:"
            echo "$RELEASES" | jq -r '.[] | "   - \(.tag_name) - 制品数: \(.assets | length)"'
          fi

      # ============================================
      # 步骤13: 结果通知
      # ============================================
      - name: 📢 同步结果
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 同步完成"
          else
            echo "⚠️ 同步部分失败"
          fi

  # ============================================
  # 【独立任务】仓库保活
  # ============================================
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    permissions:
      contents: write
    
    needs: sync
    if: always()
    
    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: ⚙️ 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 💚 仓库保活
        run: |
          echo "=========================================="
          echo "💚 仓库保活"
          echo "=========================================="
          
          CURRENT_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "当前时间: $CURRENT_TIME"
          
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if [[ "$LAST_COMMIT_MSG" == *"[skip ci] keepalive"* ]]; then
            echo "最近提交已是保活提交，跳过"
          else
            echo "创建保活空提交..."
            git commit --allow-empty -m "[skip ci] keepalive: 仓库保活 $(date -u '+%Y-%m-%d')"
            git push origin $(git branch --show-current)
            echo "✅ 保活提交已推送"
          fi
          
          echo "✅ 保活完成"

      - name: 📢 保活结果
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 保活成功"
          else
            echo "❌ 保活失败"
            exit 1
          fi
